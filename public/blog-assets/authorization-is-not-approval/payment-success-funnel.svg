<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 900" role="img" aria-labelledby="title desc">
  <title id="title">Payment success funnel from invoices due to retained revenue</title>
  <desc id="desc">A funnel showing 1,000 invoices due, 970 eligible, 950 initial attempts, 760 initial approvals, 820 eventual approvals, 810 captured, 802 settled, 790 after refunds, and 775 retained.</desc>
  <defs>
    <linearGradient id="bar" x1="0" x2="1">
      <stop offset="0%" stop-color="#315f4b"/>
      <stop offset="100%" stop-color="#b98a36"/>
    </linearGradient>
    <filter id="shadow" x="-8%" y="-18%" width="116%" height="136%">
      <feDropShadow dx="0" dy="8" stdDeviation="9" flood-color="#2d3130" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1280" height="900" rx="24" fill="#fbfaf7"/>
  <text x="56" y="62" fill="#20231f" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="760">Payment success is a funnel, not one metric</text>
  <text x="56" y="98" fill="#62665f" font-family="Inter, Arial, sans-serif" font-size="18">An approval is only one stage between a payment obligation and retained revenue.</text>
  <g font-family="Inter, Arial, sans-serif" font-size="16">
    <line x1="270" y1="144" x2="270" y2="806" stroke="#ded8cc" stroke-width="2"/>
    <line x1="1120" y1="806" x2="270" y2="806" stroke="#ded8cc" stroke-width="2"/>
    <g fill="#62665f" font-size="13">
      <text x="270" y="832" text-anchor="middle">0</text>
      <text x="482" y="832" text-anchor="middle">250</text>
      <text x="695" y="832" text-anchor="middle">500</text>
      <text x="908" y="832" text-anchor="middle">750</text>
      <text x="1120" y="832" text-anchor="middle">1,000</text>
    </g>
    <g fill="none" stroke="#eee7dc" stroke-width="1">
      <line x1="482" y1="144" x2="482" y2="806"/>
      <line x1="695" y1="144" x2="695" y2="806"/>
      <line x1="908" y1="144" x2="908" y2="806"/>
      <line x1="1120" y1="144" x2="1120" y2="806"/>
    </g>
    <g filter="url(#shadow)">
      <rect x="270" y="154" width="850" height="50" rx="8" fill="url(#bar)"/>
      <rect x="270" y="230" width="825" height="50" rx="8" fill="url(#bar)"/>
      <rect x="270" y="306" width="808" height="50" rx="8" fill="url(#bar)"/>
      <rect x="270" y="382" width="646" height="50" rx="8" fill="url(#bar)"/>
      <rect x="270" y="458" width="697" height="50" rx="8" fill="url(#bar)"/>
      <rect x="270" y="534" width="689" height="50" rx="8" fill="url(#bar)"/>
      <rect x="270" y="610" width="682" height="50" rx="8" fill="url(#bar)"/>
      <rect x="270" y="686" width="672" height="50" rx="8" fill="url(#bar)"/>
      <rect x="270" y="762" width="659" height="50" rx="8" fill="url(#bar)"/>
    </g>
    <g fill="#20231f" font-weight="760" font-size="18">
      <text x="56" y="186">Invoices due</text>
      <text x="56" y="262">Eligible</text>
      <text x="56" y="338">Initial attempts</text>
      <text x="56" y="414">Initial approvals</text>
      <text x="56" y="490">Eventual approvals</text>
      <text x="56" y="566">Captured</text>
      <text x="56" y="642">Settled</text>
      <text x="56" y="718">After refunds</text>
      <text x="56" y="794">Retained</text>
    </g>
    <g fill="#fffaf0" font-size="17" font-weight="760">
      <text x="1096" y="186" text-anchor="end">1,000</text>
      <text x="1071" y="262" text-anchor="end">970</text>
      <text x="1054" y="338" text-anchor="end">950</text>
      <text x="892" y="414" text-anchor="end">760</text>
      <text x="943" y="490" text-anchor="end">820</text>
      <text x="935" y="566" text-anchor="end">810</text>
      <text x="928" y="642" text-anchor="end">802</text>
      <text x="918" y="718" text-anchor="end">790</text>
      <text x="905" y="794" text-anchor="end">775</text>
    </g>
    <g fill="#62665f" font-size="15">
      <text x="1134" y="186">100.0%</text>
      <text x="1109" y="262">97.0%</text>
      <text x="1092" y="338">95.0%</text>
      <text x="930" y="414">76.0%</text>
      <text x="981" y="490">82.0%</text>
      <text x="973" y="566">81.0%</text>
      <text x="966" y="642">80.2%</text>
      <text x="956" y="718">79.0%</text>
      <text x="943" y="794">77.5%</text>
    </g>
    <path d="M916 407 C940 430 950 447 967 483" fill="none" stroke="#a9473f" stroke-width="3" stroke-dasharray="7 7"/>
    <text x="984" y="436" fill="#a9473f" font-size="16" font-weight="720">+60 recovered through retries</text>
  </g>
</svg>
